---
# repo: jomrr/ansible-role-logindefs
# file: defaults/main.yml

logindefs_settings:
  LOGIN_TIMEOUT: "60"
  LOGIN_RETRIES: "5"

  FAILLOG_ENAB: "yes"
  LOG_OK_LOGINS: "yes"
  LOG_UNKFAIL_ENAB: "no"
  SYSLOG_SU_ENAB: "yes"
  SYSLOG_SG_ENAB: "yes"

  PASS_MAX_DAYS: "384"
  PASS_MIN_DAYS: "1"
  PASS_WARN_AGE: "7"

  UMASK: "077"
  HOME_MODE: "0700"
  DEFAULT_HOME: "no"
  TTYPERM: "0600"
  CHFN_RESTRICT: "rwh"

  SHA_CRYPT_MIN_ROUNDS: "1000000"
  SHA_CRYPT_MAX_ROUNDS: "1000000"
  YESCRYPT_COST_FACTOR: "7"

logindefs_force_settings: {}

logindefs_disabled: []
